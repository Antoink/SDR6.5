name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Keep alive via API
        run: |
          # On génère un message encodé en base64 (requis par l'API GitHub)
          CONTENT=$(echo "Keep alive $(date)" | base64)
          
          # On récupère le "sha" du fichier existant s'il existe
          SHA=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/contents/keep_alive.txt" | jq -r '.sha // empty')
          
          # On prépare les données à envoyer
          if [ -z "$SHA" ]; then
            DATA="{\"message\":\"Keep alive ping\",\"content\":\"$CONTENT\"}"
          else
            DATA="{\"message\":\"Keep alive ping\",\"content\":\"$CONTENT\",\"sha\":\"$SHA\"}"
          fi
          
          # On envoie la mise à jour directement à GitHub
          curl -X PUT \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "$DATA" \
            "https://api.github.com/repos/${{ github.repository }}/contents/keep_alive.txt"
