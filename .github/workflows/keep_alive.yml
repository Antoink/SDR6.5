name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Keep alive commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          
          # On génère un nombre aléatoire pour forcer un changement réel dans le fichier
          echo $RANDOM > keep_alive.txt
          
          git add keep_alive.txt
          git commit -m "Keep alive ping" --allow-empty
          git push origin HEAD:${{ github.ref }}
